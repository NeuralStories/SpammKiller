#cloud-config
# SCAMEATER - Cloud-init provisioning for Ubuntu 22.04 VPS
# Usage: This config is used when provisioning a new VPS (Hetzner, DigitalOcean, etc.)
# Apply with: cloud-init -d ux:/path/to/cloud-init.yml

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - git
  - vim
  - build-essential
  - ffmpeg
  - libsndfile1
  - portaudio19-dev
  - ufw
  - nginx
  - certbot
  - python3-certbot-nginx
  - python3.11
  - python3.11-venv
  - python3-pip

groups:
  - docker

users:
  - name: scameater
    groups: docker
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_pwauth: false

write_files:
  # Docker installation script (if not using cloud-init packages)
  - path: /opt/install-docker.sh
    owner: root:root
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e
      curl -fsSL https://get.docker.com | sh
      systemctl enable docker
      curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
      chmod +x /usr/local/bin/docker-compose

  # UFW firewall rules
  - path: /opt/setup-firewall.sh
    owner: root:root
    permissions: '0755'
    content: |
      #!/bin/bash
      ufw allow 22/tcp
      ufw allow 5060/udp
      ufw allow 5060/tcp
      ufw allow 10000:20000/udp
      ufw allow 8501/tcp
      ufw allow 8000/tcp
      ufw allow 9001/tcp
      ufw enable

runcmd:
  # Install Docker
  - bash /opt/install-docker.sh

  # Setup firewall
  - bash /opt/setup-firewall.sh

  # Create application directory
  - mkdir -p /opt/scameater
  - chown -R scameater:scameater /opt/scameater

  # Enable Docker service
  - systemctl enable docker
  - systemctl start docker

  # Pull SCAMEATER (placeholder - replace with actual repo)
  # - cd /opt/scameater && git clone https://github.com/youruser/scameater.git