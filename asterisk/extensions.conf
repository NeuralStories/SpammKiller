; ============================================
; SCAMEATER Dialplan - AudioSocket Bridge
; ============================================

[general]
static=yes
writeprotect=no

[honeypot-incoming]
; All incoming calls route to AudioSocket bridge
; Audio format: PCM 16-bit 8kHz signed linear, 20ms frames

; Answer the call first
exten => _X.,1,NoOp(Llamada entrante: ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)

; Set call variables for the engine
 same => n,Set(CHANNEL(hangup_handler_push)=hangup-handler,s,1)
 same => n,Set(SCAMEATER_CALL_ID=${UNIQUEID})
 same => n,Set(SCAMEATER_CALLER=${CALLERID(num)})

; Route audio via AudioSocket to Python engine
; Format: AudioSocket(uuid@host:port/options)
 same => n,AudioSocket(${SCAMEATER_CALL_ID}@engine:9010/c(slin))
 same => n,Hangup()

; Fallback handlers
exten => i,1,NoOp(Invalid extension)
 same => n,Hangup()

exten => t,1,NoOp(Timeout)
 same => n,Hangup()

; Hangup handler for cleanup
[hangup-handler]
exten => s,1,NoOp(Hangup handler - call ended)
 same => n,Return()